name: Build and Publish

# Builds both JVM modules (running their test suites) and publishes a multi-arch
# image to GHCR. Runs on pushes to main and on version tags. Pull requests are
# gated separately by tests.yml — this workflow does not run on PRs.
on:
  push:
    branches: [ "main" ]
    tags: [ "*.*.*", "v*" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # The runtime Dockerfile copies prebuilt JARs, so build (and test) both
      # modules on the host once — the JARs are architecture-independent and are
      # reused across both image platforms.
      - name: Build converter JAR (runs tests)
        working-directory: ./converter
        run: ./gradlew --no-daemon build

      - name: Build server JAR (runs tests)
        working-directory: ./server
        run: ./gradlew --no-daemon build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # Org-scoped PAT (packages:write) — more reliable than the repo-scoped
          # GITHUB_TOKEN for publishing under the organization's GHCR namespace.
          password: ${{ secrets.ORG_REPO_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/fhir-uml-server
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
